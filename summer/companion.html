<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Companion — Powered by Can Crops</title>
  <link rel="stylesheet" href="css/companion.css" />
</head>
<body>

  <!-- =====================================================
       NAVIGATION
       ===================================================== -->
  <nav id="companion-nav">
    <div class="nav-wordmark">
      <span id="nav-app-name"></span>
      <span id="nav-sponsor-line"></span>
    </div>

    <ul id="companion-nav-links"></ul>

    <div class="nav-logo-block">
      <img id="nav-logo" src="" alt="" />
    </div>
  </nav>

  <!-- =====================================================
       HERO
       ===================================================== -->
  <section id="hero">
    <div class="hero-content">
      <p  id="hero-eyebrow"></p>
      <h1 id="hero-heading"></h1>
      <p  id="hero-description"></p>
      <div class="hero-cta-row">
        <a id="hero-cta-primary"   href="#discover" class="btn-amber"></a>
        <a id="hero-cta-secondary" href="#brewing"  class="btn-outline-amber"></a>
      </div>
    </div>

    <div class="hero-visual">
      <img id="hero-mascot" class="mascot" src="" alt="" />
      <div class="hero-sponsor-badge">
        <span id="hero-sponsor-text"></span>
        <img  id="hero-sponsor-logo" src="" alt="" />
      </div>
    </div>
  </section>

  <!-- =====================================================
       FEATURES
       ===================================================== -->
  <section id="discover" class="companion-section bg-dark">
    <div class="section-header">
      <p class="section-eyebrow">What You Can Do</p>
      <h2 id="features-heading"></h2>
      <p  id="features-subheading"></p>
    </div>
    <div id="features-grid" class="features-grid"></div>
  </section>

  <!-- =====================================================
       ORIGINS
       ===================================================== -->
  <section id="origins" class="companion-section bg-deep">
    <div class="section-header">
      <p class="section-eyebrow">Bean Origins</p>
      <h2 id="origins-heading"></h2>
      <p  id="origins-subheading"></p>
    </div>
    <div id="origins-grid" class="origins-grid"></div>
  </section>

  <!-- =====================================================
       BREWING METHODS
       ===================================================== -->
  <section id="brewing" class="companion-section bg-dark">
    <div class="section-header">
      <p class="section-eyebrow">Brewing Guide</p>
      <h2 id="brewing-heading"></h2>
      <p  id="brewing-subheading"></p>
    </div>
    <div id="brewing-grid" class="brewing-grid"></div>
  </section>

  <!-- =====================================================
       SUSTAINABILITY
       ===================================================== -->
  <section id="sustainability" class="companion-section bg-mid">
    <div class="section-header">
      <p class="section-eyebrow">Our Commitment</p>
      <h2 id="sustainability-heading"></h2>
      <p  id="sustainability-subheading"></p>
    </div>
    <div id="sustainability-grid" class="sustainability-grid"></div>
  </section>

  <!-- =====================================================
       COMMUNITY
       ===================================================== -->
  <section id="community" class="companion-section bg-mid">
    <div class="section-header">
      <p class="section-eyebrow">Community</p>
      <h2 id="community-heading"></h2>
      <p  id="community-subheading"></p>
    </div>
    <div id="community-stats" class="community-stats"></div>
    <a  id="community-cta" href="#" class="btn-community"></a>
  </section>

  <!-- =====================================================
       SHOP CTA
       ===================================================== -->
  <section id="shop" class="companion-section">
    <div class="section-header">
      <p class="section-eyebrow">Shop</p>
      <h2 id="shop-heading"></h2>
      <p  id="shop-subheading"></p>
    </div>
    <a  id="shop-cta" href="#" class="btn-shop"></a>
    <p  id="shop-note" class="shop-note"></p>
  </section>

  <!-- =====================================================
       FOOTER
       ===================================================== -->
  <footer id="companion-footer">
    <div class="footer-brand">
      <span id="footer-app-name" class="footer-app-name"></span>
      <span id="footer-tagline"  class="footer-tagline"></span>
    </div>
    <img id="footer-logo" src="" alt="" />
    <p   id="footer-copy" class="footer-copy"></p>
  </footer>

  <script src="js/companion.js"></script>
</body>
</html>
