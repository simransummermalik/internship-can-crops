<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Can Crops Inc.</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- =====================================================
       NAVIGATION
       ===================================================== -->
  <nav id="main-nav">
    <div class="nav-logo">
      <a href="#home">
        <img src="../assets/logo.png" alt="Can Crops Inc." />
      </a>
    </div>
    <ul id="nav-links"></ul>
    <a id="nav-cta" href="login.html"></a>
  </nav>

  <!-- =====================================================
       HERO
       ===================================================== -->
  <section id="home">
    <div id="hero">
      <div class="hero-text">
        <h1 id="hero-heading"></h1>
        <p  id="hero-description"></p>
        <div class="hero-cta-group">
          <a id="hero-cta-primary"   href="#imports" class="btn-hero-primary"></a>
          <a id="hero-cta-secondary" href="#contact"  class="btn-hero-outline"></a>
        </div>
      </div>
      <div class="hero-mascot">
        <img id="hero-mascot" src="" alt="" />
      </div>
    </div>
  </section>

  <!-- =====================================================
       STATS BAR
       ===================================================== -->
  <div id="stats-bar"></div>

  <!-- =====================================================
       WHY CHOOSE US
       ===================================================== -->
  <section id="why-us" class="content-section bg-cream-alt">
    <div class="section-header reveal">
      <h2 id="why-heading"></h2>
      <p  id="why-subheading"></p>
    </div>
    <div id="why-grid" class="why-grid"></div>
  </section>

  <!-- =====================================================
       IMPORTS
       ===================================================== -->
  <section id="imports" class="content-section bg-white">
    <div class="section-header reveal">
      <h2 id="imports-heading"></h2>
      <p  id="imports-subheading"></p>
    </div>
    <div id="imports-grid" class="product-grid"></div>
  </section>

  <!-- =====================================================
       COFFEE BEANS
       ===================================================== -->
  <section id="coffee" class="content-section bg-terra">
    <div class="section-header reveal">
      <h2 id="coffee-heading"></h2>
      <p  id="coffee-subheading"></p>
    </div>
    <div id="coffee-grid" class="coffee-grid"></div>
  </section>

  <!-- =====================================================
       ABOUT
       ===================================================== -->
  <section id="about" class="content-section bg-cream">
    <div class="about-text">
      <h2 id="about-heading" class="reveal"></h2>
      <div id="about-paragraphs"></div>
    </div>
    <div class="about-visual">
      <div id="about-highlights" class="about-highlights"></div>
    </div>
  </section>

  <!-- =====================================================
       EXPORTS
       ===================================================== -->
  <section id="exports" class="content-section bg-white">
    <div class="section-header reveal">
      <h2 id="exports-heading"></h2>
      <p  id="exports-subheading"></p>
    </div>
    <div id="exports-grid" class="product-grid"></div>
  </section>

  <!-- =====================================================
       CONTACT BANNER
       ===================================================== -->
  <div id="contact">
    <h2 id="contact-heading"></h2>
    <p  id="contact-description"></p>
    <a  id="contact-cta" href="#"></a>
  </div>

  <!-- =====================================================
       FOOTER
       ===================================================== -->
  <footer id="main-footer">
    <p id="footer-text"></p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
